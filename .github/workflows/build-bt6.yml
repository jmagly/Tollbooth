# BT-6 downstream build pipeline for the Tollbooth fork
#
# This workflow lives on the BT-6 fork (jmagly/Tollbooth) of
# FlechetteLabs/Tollbooth. It builds the 3 canonical service containers
# (proxy, backend, frontend) and publishes them to
# ghcr.io/bt-6/tollbooth-{proxy,backend,frontend} with OCI labels that
# preserve attribution to FlechetteLabs as the upstream source.
#
# This workflow does NOT modify upstream sources — it only consumes the
# existing Dockerfiles in proxy/, backend/, frontend/ as-is. BT-6-specific
# patches (if any) land in the fork's git history with clear commit
# messages documenting the change.
#
# Triggers:
#   - push to main (path-filtered to the service Dockerfiles + this workflow)
#   - tag push v* (versioned releases)
#   - manual via workflow_dispatch
#
# Secrets required (configure on jmagly/Tollbooth):
#   GH_PUBLISH_TOKEN — GitHub PAT with write:packages on BT-6 org
#                      (same secret as used in BT6-ARSENAL / bt6/workbench
#                       publishing pipelines)
#
# Image labels per service:
#   - org.opencontainers.image.source = https://github.com/FlechetteLabs/Tollbooth (upstream)
#   - org.opencontainers.image.authors = FlechetteLabs
#   - org.opencontainers.image.vendor = BT-6 (downstream build)
#   - org.opencontainers.image.licenses = AGPL-3.0-only
#   - org.opencontainers.image.url = https://flechettelabs.com/tollbooth

name: build-bt6

on:
  push:
    branches: [main]
    paths:
      - 'proxy/**'
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build-bt6.yml'
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build + Publish tollbooth-${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [proxy, backend, frontend]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        # Username must be the GitHub user that OWNS the PAT in
        # GH_PUBLISH_TOKEN. The PAT needs write:packages scope on BT-6 org
        # so tollbooth-{proxy,backend,frontend} can publish under ghcr.io/bt-6/*.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PUBLISH_TOKEN }}

      - name: Compute tags
        id: meta
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAG_SUFFIXES="${VERSION} latest"
          else
            TAG_SUFFIXES="latest sha-${SHORT_SHA}"
            VERSION="${SHORT_SHA}"
          fi

          BASE="ghcr.io/bt-6/tollbooth-${{ matrix.service }}"
          TAGS=""
          for t in ${TAG_SUFFIXES}; do
            TAGS="${TAGS} ${BASE}:${t}"
          done
          TAGS="${TAGS# }"

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "Image tags: ${TAGS}"

      - name: Build + push tollbooth-${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=BT-6 Tollbooth ${{ matrix.service }}
            org.opencontainers.image.description=Built from jmagly/Tollbooth (BT-6 downstream fork of FlechetteLabs/Tollbooth). Service: ${{ matrix.service }}.
            org.opencontainers.image.source=https://github.com/FlechetteLabs/Tollbooth
            org.opencontainers.image.url=https://flechettelabs.com/tollbooth
            org.opencontainers.image.authors=FlechetteLabs
            org.opencontainers.image.vendor=BT-6 (downstream build)
            org.opencontainers.image.licenses=AGPL-3.0-only
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
